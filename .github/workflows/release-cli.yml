name: Release CLI

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-cli-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive release version
        id: version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          version="${TAG_NAME#v}"
          workspace_version="$(perl -0ne 'print $1 if /\[workspace\.package\].*?^version = "([^"]+)"/ms' Cargo.toml)"
          if [ -z "$workspace_version" ]; then
            echo "workspace package version not found" >&2
            exit 1
          fi
          if [ "$version" != "$workspace_version" ]; then
            echo "tag version ${version} does not match workspace version ${workspace_version}" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: macos-13
            target: x86_64-apple-darwin
          - runner: macos-14
            target: aarch64-apple-darwin

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Build plankton-cli
        run: cargo build --locked --release -p plankton-cli --target ${{ matrix.target }}

      - name: Package CLI archive
        run: |
          bash scripts/package-cli-release.sh \
            "${{ needs.prepare.outputs.version }}" \
            "${{ matrix.target }}" \
            "target/${{ matrix.target }}/release/plankton-cli" \
            dist

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: plankton-cli-${{ matrix.target }}
          path: dist/*.tar.gz

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download packaged archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create source archive and checksums
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          git archive --format=tar.gz --prefix="plankton-v${VERSION}/" "${TAG_NAME}" > "dist/plankton-v${VERSION}-source.tar.gz"
          : > dist/checksums.txt
          for archive in dist/*.tar.gz; do
            checksum="$(shasum -a 256 "$archive" | awk '{print $1}')"
            echo "${checksum}  $(basename "$archive")" >> dist/checksums.txt
          done

      - name: Render Homebrew formula
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          GITHUB_REPOSITORY_NAME: ${{ github.repository }}
        run: |
          bash scripts/render-homebrew-formula.sh \
            "${VERSION}" \
            "${GITHUB_REPOSITORY_NAME}" \
            dist/checksums.txt \
            > dist/plankton-cli.rb

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/checksums.txt
            dist/plankton-cli.rb

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          if [ -z "${HOMEBREW_TAP_GITHUB_TOKEN:-}" ]; then
            echo "Skipping Homebrew tap publish because HOMEBREW_TAP_GITHUB_TOKEN is not configured"
            exit 0
          fi
          tap_repository="${HOMEBREW_TAP_REPOSITORY:-zqqqqz2000/homebrew-tap}"
          formula_name="plankton-cli"
          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/${tap_repository}.git" tap
          mkdir -p tap/Formula
          cp "dist/${formula_name}.rb" "tap/Formula/${formula_name}.rb"
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "Formula/${formula_name}.rb"
          if git diff --cached --quiet; then
            echo "No Homebrew tap changes to publish"
            exit 0
          fi
          git commit -m "${formula_name} ${VERSION}"
          git push
