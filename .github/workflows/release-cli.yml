name: Release Plankton

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-plankton-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    name: Prepare Release Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Derive release version
        id: version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          version="${TAG_NAME#v}"
          workspace_version="$(perl -0ne 'print $1 if /\[workspace\.package\].*?^version = "([^"]+)"/ms' Cargo.toml)"
          if [ -z "$workspace_version" ]; then
            echo "workspace package version not found" >&2
            exit 1
          fi
          if [ "$version" != "$workspace_version" ]; then
            echo "tag version ${version} does not match workspace version ${workspace_version}" >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"

  build_cli:
    name: Build CLI ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: macos-14
            target: aarch64-apple-darwin

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Build plankton CLI
        run: cargo build --locked --release -p plankton --target ${{ matrix.target }}

      - name: Package CLI archive
        run: |
          bash scripts/package-cli-release.sh \
            "${{ needs.prepare.outputs.version }}" \
            "${{ matrix.target }}" \
            "target/${{ matrix.target }}/release/plankton" \
            dist

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: plankton-${{ matrix.target }}
          path: dist/*.tar.gz

  build_desktop:
    name: Build Desktop macOS app
    runs-on: macos-14
    needs: prepare

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build outputs
        uses: Swatinem/rust-cache@v2

      - name: Install desktop dependencies
        run: npm --prefix apps/desktop ci

      - name: Build Plankton.app
        run: npm --prefix apps/desktop run tauri build -- --bundles app

      - name: Package desktop app archive
        run: |
          bash scripts/package-desktop-release.sh \
            "${{ needs.prepare.outputs.version }}" \
            "target/release/bundle/macos/Plankton.app" \
            dist

      - name: Upload desktop archive
        uses: actions/upload-artifact@v4
        with:
          name: plankton-desktop-macos
          path: dist/*.zip

  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    needs:
      - prepare
      - build_cli
      - build_desktop

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download packaged archives
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create source archive and checksums
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          git archive --format=tar.gz --prefix="plankton-v${VERSION}/" "${TAG_NAME}" > "dist/plankton-v${VERSION}-source.tar.gz"
          : > dist/checksums.txt
          for archive in dist/*.tar.gz dist/*.zip; do
            checksum="$(shasum -a 256 "$archive" | awk '{print $1}')"
            echo "${checksum}  $(basename "$archive")" >> dist/checksums.txt
          done

      - name: Render Homebrew helper formula and cask
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          GITHUB_REPOSITORY_NAME: ${{ github.repository }}
        run: |
          bash scripts/render-homebrew-formula.sh \
            "${VERSION}" \
            "${GITHUB_REPOSITORY_NAME}" \
            dist/checksums.txt \
            > dist/plankton-helper.rb
          bash scripts/render-homebrew-cask.sh \
            "${VERSION}" \
            "${GITHUB_REPOSITORY_NAME}" \
            dist/checksums.txt \
            > dist/plankton.rb

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt
            dist/plankton-helper.rb
            dist/plankton.rb

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          HOMEBREW_TAP_REPOSITORY: ${{ vars.HOMEBREW_TAP_REPOSITORY }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          if [ -z "${HOMEBREW_TAP_GITHUB_TOKEN:-}" ]; then
            echo "Skipping Homebrew tap publish because HOMEBREW_TAP_GITHUB_TOKEN is not configured"
            exit 0
          fi
          tap_repository="${HOMEBREW_TAP_REPOSITORY:-zqqqqz2000/homebrew-tap}"
          git clone "https://x-access-token:${HOMEBREW_TAP_GITHUB_TOKEN}@github.com/${tap_repository}.git" tap
          mkdir -p tap/Formula
          mkdir -p tap/Casks
          cp "dist/plankton-helper.rb" "tap/Formula/plankton-helper.rb"
          cp "dist/plankton.rb" "tap/Casks/plankton.rb"
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -e "Formula/plankton-cli.rb" ]; then
            git rm -f "Formula/plankton-cli.rb"
          fi
          git add "Formula/plankton-helper.rb" "Casks/plankton.rb"
          if git diff --cached --quiet; then
            echo "No Homebrew tap changes to publish"
            exit 0
          fi
          git commit -m "plankton ${VERSION}"
          git push
